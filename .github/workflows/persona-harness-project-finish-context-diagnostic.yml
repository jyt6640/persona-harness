name: Diagnose public project finish producer context

on:
  workflow_call:

concurrency:
  group: project-finish-attestation-context-diagnostic-${{ github.repository_id }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  resolve:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.event.repository.private == false
    outputs:
      producer-checkout: ${{ steps.producer-checkout.outputs.status }}
      producer-sha: ${{ steps.producer-pin.outputs.sha }}
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pushed public project source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify pushed public project checkout
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REPOSITORY_VISIBILITY: ${{ github.repository_visibility }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = push
          test "$GITHUB_REF" = refs/heads/main
          test "$GITHUB_REPOSITORY_VISIBILITY" = public
          git fetch origin main --no-tags >/dev/null 2>&1
          test "$(git rev-parse refs/remotes/origin/main 2>/dev/null)" = "$GITHUB_SHA"
          test -z "$(git status --porcelain=v1 --untracked-files=all 2>/dev/null)"

      - name: Resolve immutable Persona Harness diagnostic revision
        id: producer-pin
        env:
          CALLER_WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          node <<'NODE'
          const fs = require("node:fs")
          const path = require("node:path")

          const FAILURE_CODE = "project-finish-producer-caller-pin"
          const EXPECTED_REPOSITORY = "jyt6640/persona-harness"
          const EXPECTED_WORKFLOW_PATH = ".github/workflows/persona-harness-project-finish-context-diagnostic.yml"
          const EXPECTED_TARGET = `${EXPECTED_REPOSITORY}/${EXPECTED_WORKFLOW_PATH}`
          const MAX_WORKFLOW_BYTES = 128 * 1024
          const CALLER_PATH = /^\.github\/workflows\/[A-Za-z0-9][A-Za-z0-9._-]{0,127}\.ya?ml$/u
          const PINNED_TARGET = new RegExp(`^${escapeRegExp(EXPECTED_TARGET)}@([a-f0-9]{40})$`, "u")

          function failClosed() {
            throw new Error(FAILURE_CODE)
          }

          function requiredEnv(name) {
            const value = process.env[name]
            if (typeof value !== "string" || value.length === 0 || value.length > 512 || /[\u0000\r\n]/u.test(value)) failClosed()
            return value
          }

          function escapeRegExp(value) {
            return value.replace(/[.*+?^${}()|[\]\\]/gu, "\\$&")
          }

          function structuredJobs(source) {
            const lines = source.split(/\r?\n/u).flatMap((raw, index) => {
              if (raw.includes("\u0000") || raw.includes("\t")) failClosed()
              const content = stripComment(raw.slice(raw.search(/\S/u)))
              return content.length === 0 ? [] : [{ content, indent: raw.length - raw.trimStart().length, line: index + 1 }]
            })
            const roots = lines.filter(({ content, indent }) => indent === 0 && content === "jobs:")
            if (roots.length !== 1) failClosed()
            const jobsRoot = roots[0]
            const section = lines.filter(({ indent, line }) => line > jobsRoot.line && indent > jobsRoot.indent)
            if (section.length === 0) failClosed()
            const jobIndent = section[0].indent
            const jobs = new Map()
            let current

            for (const entry of section) {
              if (entry.indent < jobIndent) break
              if (entry.indent === jobIndent) {
                const match = /^([A-Za-z0-9_-]{1,128}):$/u.exec(entry.content)
                if (match === null || jobs.has(match[1])) failClosed()
                current = { keys: new Set(), name: match[1], propertyIndent: undefined, uses: undefined }
                jobs.set(match[1], current)
                continue
              }
              if (current === undefined) failClosed()
              if (current.propertyIndent === undefined) current.propertyIndent = entry.indent
              if (entry.indent !== current.propertyIndent) continue

              const match = /^([A-Za-z0-9_-]{1,128}):(?:[ ]+(.*))?$/u.exec(entry.content)
              if (match === null || current.keys.has(match[1])) failClosed()
              current.keys.add(match[1])
              if (match[1] === "uses") current.uses = parseScalar(match[2])
            }
            return jobs
          }

          function stripComment(value) {
            let quote = ""
            for (let index = 0; index < value.length; index += 1) {
              const character = value[index]
              if (quote === "") {
                if (character === "'" || character === "\"") quote = character
                if (character === "#" && (index === 0 || /\s/u.test(value[index - 1]))) return value.slice(0, index).trimEnd()
              } else if (character === quote && value[index - 1] !== "\\") {
                quote = ""
              }
            }
            return value.trimEnd()
          }

          function parseScalar(value) {
            if (typeof value !== "string" || value.length === 0 || value.length > 512) failClosed()
            if (value.startsWith("\"")) {
              try {
                const decoded = JSON.parse(value)
                if (typeof decoded !== "string") failClosed()
                return decoded
              } catch {
                failClosed()
              }
            }
            if (value.startsWith("'")) {
              if (!/^'[^']*'$/u.test(value)) failClosed()
              return value.slice(1, -1)
            }
            if (/[&*!|>{}\[\],]/u.test(value)) failClosed()
            return value
          }

          try {
            const workspace = fs.realpathSync(requiredEnv("GITHUB_WORKSPACE"))
            const repository = requiredEnv("GITHUB_REPOSITORY")
            const workflowRef = requiredEnv("CALLER_WORKFLOW_REF")
            const reference = new RegExp(`^${escapeRegExp(repository)}/(.+)@refs/heads/main$`, "u").exec(workflowRef)
            if (reference === null || !CALLER_PATH.test(reference[1])) failClosed()

            const candidate = path.resolve(workspace, reference[1])
            if (path.relative(workspace, candidate).startsWith("..") || !fs.lstatSync(candidate).isFile() || fs.realpathSync(candidate) !== candidate) failClosed()

            const source = fs.readFileSync(candidate, "utf8")
            if (Buffer.byteLength(source, "utf8") > MAX_WORKFLOW_BYTES) failClosed()
            const jobs = structuredJobs(source)
            const matching = [...jobs.values()].filter(({ uses }) => typeof uses === "string" && uses.startsWith(`${EXPECTED_TARGET}@`))
            if (matching.length !== 1 || matching[0]?.uses === undefined) failClosed()
            const pin = PINNED_TARGET.exec(matching[0].uses)
            if (pin === null) failClosed()

            fs.appendFileSync(requiredEnv("GITHUB_OUTPUT"), `sha=${pin[1]}\n`, { encoding: "utf8", mode: 0o600 })
          } catch {
            process.stderr.write(`${FAILURE_CODE}\n`)
            process.exitCode = 1
          }
          NODE

      - name: Checkout immutable Persona Harness diagnostic source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
          path: .persona-harness-producer
          persist-credentials: false
          ref: ${{ steps.producer-pin.outputs.sha }}
          repository: jyt6640/persona-harness

      - name: Verify reusable diagnostic checkout
        id: producer-checkout
        working-directory: .persona-harness-producer
        env:
          PERSONA_HARNESS_PRODUCER_SHA: ${{ steps.producer-pin.outputs.sha }}
        run: |
          set -euo pipefail
          node scripts/verify-project-finish-producer-checkout.mjs
          printf 'status=match\n' >> "$GITHUB_OUTPUT"

  diagnose:
    needs:
      - resolve
      - hosted-selftest
    if: needs.resolve.result == 'success' && needs.hosted-selftest.result == 'success'
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout immutable Persona Harness diagnostic source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
          path: .persona-harness-producer
          persist-credentials: false
          ref: ${{ needs.resolve.outputs.producer-sha }}
          repository: jyt6640/persona-harness

      - name: Create bounded project producer context fallback
        env:
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ""
          ACTIONS_ID_TOKEN_REQUEST_URL: ""
        uses: ./.persona-harness-producer/.github/actions/project-finish-context-diagnostic-fallback
        with:
          diagnostic-runner-temp: ${{ runner.temp }}

      - name: Emit bounded project producer context diagnostic
        id: diagnostic
        continue-on-error: true
        env:
          PROJECT_FINISH_DIAGNOSTIC_ACTIONS: "true"
          PROJECT_FINISH_DIAGNOSTIC_CALLER_WORKFLOW_REF: ${{ github.workflow_ref }}
          PROJECT_FINISH_DIAGNOSTIC_CALLER_WORKFLOW_SHA: ${{ github.workflow_sha }}
          PROJECT_FINISH_DIAGNOSTIC_EVENT_NAME: ${{ github.event_name }}
          PROJECT_FINISH_DIAGNOSTIC_PRODUCER_CHECKOUT: ${{ needs.resolve.outputs.producer-checkout }}
          PROJECT_FINISH_DIAGNOSTIC_PRODUCER_SHA: ${{ needs.resolve.outputs.producer-sha }}
          PROJECT_FINISH_DIAGNOSTIC_REF: ${{ github.ref }}
          PROJECT_FINISH_DIAGNOSTIC_REPOSITORY: ${{ github.repository }}
          PROJECT_FINISH_DIAGNOSTIC_REPOSITORY_ID: ${{ github.repository_id }}
          PROJECT_FINISH_DIAGNOSTIC_REPOSITORY_VISIBILITY: ${{ github.repository_visibility }}
          PROJECT_FINISH_DIAGNOSTIC_REUSABLE_WORKFLOW_REF: jyt6640/persona-harness/.github/workflows/persona-harness-project-finish-context-diagnostic.yml@refs/heads/main
          PROJECT_FINISH_DIAGNOSTIC_REUSABLE_WORKFLOW_SHA: ${{ needs.resolve.outputs.producer-sha }}
          PROJECT_FINISH_DIAGNOSTIC_RUN_ATTEMPT: ${{ github.run_attempt }}
          PROJECT_FINISH_DIAGNOSTIC_RUN_ID: ${{ github.run_id }}
          PROJECT_FINISH_DIAGNOSTIC_RUNNER_ENVIRONMENT: ${{ runner.environment }}
          PROJECT_FINISH_DIAGNOSTIC_RUNNER_OS: ${{ runner.os }}
          PROJECT_FINISH_DIAGNOSTIC_RUNNER_TEMP: ${{ runner.temp }}
          PROJECT_FINISH_DIAGNOSTIC_SOURCE_HEAD: ${{ github.sha }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const bridge = require("./.persona-harness-producer/.github/actions/project-finish-context-diagnostic/oidc-capability-bridge.cjs")
            const summary = await bridge.runProjectFinishContextDiagnosticWithCore({ core })
            core.setOutput("summary-status", summary.outcome)
            if (summary.outcome !== "match") {
              core.setFailed("project-finish-producer-context-diagnostic-blocked")
            }

      - name: Finalize bounded project producer context diagnostic
        id: finalizer
        if: always()
        env:
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ""
          ACTIONS_ID_TOKEN_REQUEST_URL: ""
        uses: ./.persona-harness-producer/.github/actions/project-finish-context-diagnostic-finalizer
        with:
          diagnostic-runner-temp: ${{ runner.temp }}
          diagnostic-step-outcome: ${{ steps.diagnostic.outcome }}
          diagnostic-summary-status: ${{ steps.diagnostic.outputs.summary-status }}

      - name: Upload bounded project producer context diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          if-no-files-found: error
          name: project-finish-attestation-context-diagnostic
          path: ${{ runner.temp }}/project-finish-attestation-context-diagnostic/summary.json
          retention-days: 7

      - name: Report bounded project producer context diagnostic outcome
        if: always()
        env:
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ""
          ACTIONS_ID_TOKEN_REQUEST_URL: ""
        uses: ./.persona-harness-producer/.github/actions/project-finish-context-diagnostic-outcome
        with:
          diagnostic-outcome: ${{ steps.finalizer.outputs.outcome }}

  hosted-selftest:
    needs: resolve
    if: needs.resolve.result == 'success'
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout immutable Persona Harness diagnostic source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
          path: .persona-harness-producer
          persist-credentials: false
          ref: ${{ needs.resolve.outputs.producer-sha }}
          repository: jyt6640/persona-harness

      - name: Exercise required native runner OIDC diagnostic context
        id: native-selftest
        continue-on-error: true
        env:
          PROJECT_FINISH_DIAGNOSTIC_ACTIONS: "true"
          PROJECT_FINISH_DIAGNOSTIC_CALLER_WORKFLOW_REF: ${{ github.workflow_ref }}
          PROJECT_FINISH_DIAGNOSTIC_CALLER_WORKFLOW_SHA: ${{ github.workflow_sha }}
          PROJECT_FINISH_DIAGNOSTIC_EVENT_NAME: ${{ github.event_name }}
          PROJECT_FINISH_DIAGNOSTIC_PRODUCER_CHECKOUT: ${{ needs.resolve.outputs.producer-checkout }}
          PROJECT_FINISH_DIAGNOSTIC_PRODUCER_SHA: ${{ needs.resolve.outputs.producer-sha }}
          PROJECT_FINISH_DIAGNOSTIC_REF: ${{ github.ref }}
          PROJECT_FINISH_DIAGNOSTIC_REPOSITORY: ${{ github.repository }}
          PROJECT_FINISH_DIAGNOSTIC_REPOSITORY_ID: ${{ github.repository_id }}
          PROJECT_FINISH_DIAGNOSTIC_REPOSITORY_VISIBILITY: ${{ github.repository_visibility }}
          PROJECT_FINISH_DIAGNOSTIC_REUSABLE_WORKFLOW_REF: jyt6640/persona-harness/.github/workflows/persona-harness-project-finish-context-diagnostic.yml@refs/heads/main
          PROJECT_FINISH_DIAGNOSTIC_REUSABLE_WORKFLOW_SHA: ${{ needs.resolve.outputs.producer-sha }}
          PROJECT_FINISH_DIAGNOSTIC_RUN_ATTEMPT: ${{ github.run_attempt }}
          PROJECT_FINISH_DIAGNOSTIC_RUN_ID: ${{ github.run_id }}
          PROJECT_FINISH_DIAGNOSTIC_RUNNER_ENVIRONMENT: ${{ runner.environment }}
          PROJECT_FINISH_DIAGNOSTIC_RUNNER_OS: ${{ runner.os }}
          PROJECT_FINISH_DIAGNOSTIC_RUNNER_TEMP: ${{ runner.temp }}
          PROJECT_FINISH_DIAGNOSTIC_SOURCE_HEAD: ${{ github.sha }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const bridge = require("./.persona-harness-producer/.github/actions/project-finish-context-diagnostic/oidc-capability-bridge.cjs")
            await bridge.runRequiredNativeProjectFinishContextSelftestWithCore({ core })

      - name: Upload native runner OIDC diagnostic context summary
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          if-no-files-found: error
          name: project-finish-attestation-context-native-selftest
          path: ${{ runner.temp }}/project-finish-context-diagnostic-selftest/summary.json
          retention-days: 7

      - name: Report native runner OIDC diagnostic selftest outcome
        if: always()
        env:
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ""
          ACTIONS_ID_TOKEN_REQUEST_URL: ""
        uses: ./.persona-harness-producer/.github/actions/project-finish-context-diagnostic-outcome
        with:
          diagnostic-outcome: ${{ steps.native-selftest.outcome == 'success' && 'match' || 'blocked' }}
