name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: "npm dist-tag to publish"
        required: true
        default: "next"
        type: choice
        options:
          - next
          - latest

concurrency:
  group: publish-${{ github.ref }}-${{ inputs.dist_tag }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Verify and publish
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Verify canonical main source
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          canonical_main_sha="$(git rev-parse refs/remotes/origin/main)"
          if git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            is_ancestor=true
          else
            is_ancestor=false
          fi
          node scripts/release-workflow-policy.mjs canonical-main \
            --ref "$GITHUB_REF" \
            --sha "$GITHUB_SHA" \
            --canonical-main-sha "$canonical_main_sha" \
            --is-ancestor "$is_ancestor"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Show publish toolchain
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Check docs
        run: npm run check:docs

      - name: Check injection value
        run: npm run check:injection-value

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Product smoke
        run: npm run smoke:product-mvp

      - name: Validate publish inputs
        env:
          DIST_TAG: ${{ inputs.dist_tag }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          echo "PACKAGE_VERSION=$version" >> "$GITHUB_ENV"
          echo "EXPECTED_GIT_HEAD=${GITHUB_SHA}" >> "$GITHUB_ENV"
          node scripts/release-workflow-policy.mjs dist-tag \
            --version "$version" \
            --dist-tag "$DIST_TAG"

          echo "Publishing persona-harness@$version with dist-tag $DIST_TAG"

      - name: Pack dry run
        run: npm pack --dry-run --json

      - name: Publish to npm
        env:
          DIST_TAG: ${{ inputs.dist_tag }}
        run: npm publish --access public --tag "$DIST_TAG" --provenance

      - name: Verify registry package
        env:
          DIST_TAG: ${{ inputs.dist_tag }}
        run: |
          set -euo pipefail

          for attempt in {1..30}; do
            if npm view "persona-harness@${PACKAGE_VERSION}" version gitHead dist.shasum dist.integrity --json > registry-package.json 2>/dev/null; then
              break
            fi
            echo "Waiting for npm registry package metadata, attempt $attempt..."
            sleep 10
          done

          npm dist-tag ls persona-harness > dist-tags.txt
          node scripts/release-workflow-policy.mjs registry \
            --metadata registry-package.json \
            --dist-tags dist-tags.txt \
            --expected-version "$PACKAGE_VERSION" \
            --expected-head "$EXPECTED_GIT_HEAD" \
            --dist-tag "$DIST_TAG"

      - name: Publish summary
        run: |
          {
            echo "## npm publish verified"
            echo
            echo "- package: persona-harness@${PACKAGE_VERSION}"
            echo "- gitHead: ${EXPECTED_GIT_HEAD}"
            echo "- dist-tag: ${{ inputs.dist_tag }}"
            echo
            echo "### Registry package"
            echo '```json'
            cat registry-package.json
            echo '```'
            echo
            echo "### Dist-tags"
            echo '```text'
            cat dist-tags.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
