name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: "npm dist-tag to publish"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - next
          - latest
      approval_scope:
        description: "Required explicit release approval scope for the selected channel"
        required: true
        default: "staging-only"
        type: choice
        options:
          - staging-only
          - next-promotion-approved
          - ga-approved
      tag:
        description: "Existing immutable tag exactly matching the selected package version and protected-main commit"
        required: true
        type: string

concurrency:
  group: publish-${{ github.ref }}-${{ inputs.dist_tag }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Verify and publish
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Verify canonical main source
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          TAG_NAME: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          git fetch origin main --tags
          canonical_main_sha="$(git rev-parse refs/remotes/origin/main)"
          if git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            is_ancestor=true
          else
            is_ancestor=false
          fi
          node scripts/release-workflow-policy.mjs canonical-main \
            --ref "$GITHUB_REF" \
            --sha "$GITHUB_SHA" \
            --canonical-main-sha "$canonical_main_sha" \
            --is-ancestor "$is_ancestor"
          package_version="$(node -p "require('./package.json').version")"
          tag_commit="$(git rev-parse "refs/tags/${TAG_NAME}^{commit}")"
          node scripts/release-workflow-policy.mjs tag-source \
            --tag "$TAG_NAME" \
            --version "$package_version" \
            --sha "$GITHUB_SHA" \
            --tag-commit "$tag_commit" \
            --canonical-main-sha "$canonical_main_sha" \
            --is-ancestor "$is_ancestor"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Show publish toolchain
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Check docs
        run: npm run check:docs

      - name: Check injection value
        run: npm run check:injection-value

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:repository

      - name: Build
        run: npm run build

      - name: Product smoke
        run: npm run smoke:product-mvp

      - name: Validate publish inputs
        env:
          APPROVAL_SCOPE: ${{ inputs.approval_scope }}
          DIST_TAG: ${{ inputs.dist_tag }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          echo "PACKAGE_VERSION=$version" >> "$GITHUB_ENV"
          echo "EXPECTED_GIT_HEAD=${GITHUB_SHA}" >> "$GITHUB_ENV"
          node scripts/release-workflow-policy.mjs dist-tag \
            --approval-scope "$APPROVAL_SCOPE" \
            --version "$version" \
            --dist-tag "$DIST_TAG"

          echo "Publishing persona-harness@$version with dist-tag $DIST_TAG"

      - name: Pack dry run
        run: npm pack --dry-run --json

      - name: Publish to npm
        env:
          DIST_TAG: ${{ inputs.dist_tag }}
        run: npm publish --access public --tag "$DIST_TAG" --provenance

      - name: Verify registry package
        env:
          DIST_TAG: ${{ inputs.dist_tag }}
        run: |
          set -euo pipefail

          for attempt in {1..30}; do
            if node scripts/release-registry-readback.mjs \
              --dist-tag "$DIST_TAG" \
              --source-head "$EXPECTED_GIT_HEAD" \
              --version "$PACKAGE_VERSION" \
              > registry-readback.json; then
              break
            fi
            echo "Waiting for npm registry package metadata, attempt $attempt..."
            sleep 10
          done

          test -s registry-readback.json

      - name: Publish summary
        run: |
          {
            echo "## npm publish verified"
            echo
            echo "- package: persona-harness@${PACKAGE_VERSION}"
            echo "- gitHead: ${EXPECTED_GIT_HEAD}"
            echo "- dist-tag: ${{ inputs.dist_tag }}"
            echo "- approval scope: ${{ inputs.approval_scope }}"
            echo
            echo "### Sanitized registry package readback"
            echo '```json'
            cat registry-readback.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
