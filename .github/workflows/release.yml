name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Check tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          package_version=$(node -p "require('./package.json').version")
          expected_tag="v$package_version"
          if [[ "$TAG_NAME" != "$expected_tag" ]]; then
            echo "Tag $TAG_NAME does not match package.json version $package_version"
            exit 1
          fi

      - name: Rule diagnostics
        run: npm run report:rules

      - name: Scope check
        run: npm run check:scope:strict

      - name: Injection value check
        run: npm run check:injection-value

      - name: GitHub release notes check
        run: npm run check:github-release-notes

      - name: Package dry run
        run: npm pack --dry-run

      - name: Publish dry run
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          dist_tag=next
          if [[ "$TAG_NAME" == v* ]]; then
            dist_tag=latest
            if [[ "$TAG_NAME" == *"-alpha."* ]]; then
              dist_tag=alpha
            elif [[ "$TAG_NAME" == *"-beta."* ]]; then
              dist_tag=beta
            elif [[ "$TAG_NAME" == *"-rc."* ]]; then
              dist_tag=next
            fi
          fi
          npm publish --dry-run --access public --tag "$dist_tag"

  github-release:
    name: Create GitHub release notes
    needs: verify
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate release body
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: node scripts/generate-github-release-notes.mjs --tag "$TAG_NAME" --out github-release-notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release create "$TAG_NAME" --notes-file github-release-notes.md --title "$TAG_NAME"
