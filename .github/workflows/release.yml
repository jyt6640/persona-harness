name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish the current ref to npm after verification"
        required: true
        default: false
        type: boolean
      dist_tag:
        description: "npm dist-tag to use when publishing from workflow_dispatch"
        required: true
        default: "alpha"
        type: choice
        options:
          - alpha
          - beta
          - latest

permissions:
  contents: read

jobs:
  verify:
    name: Verify package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Rule diagnostics
        run: npm run report:rules

      - name: Scope check
        run: npm run check:scope:strict

      - name: Injection value check
        run: npm run check:injection-value

      - name: Package dry run
        run: npm pack --dry-run

  publish:
    name: Publish npm package
    needs: verify
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.publish == true
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          dist_tag=latest
          if [[ "$TAG_NAME" == *"-alpha."* ]]; then
            dist_tag=alpha
          elif [[ "$TAG_NAME" == *"-beta."* ]]; then
            dist_tag=beta
          fi
          npm publish --provenance --access public --tag "$dist_tag"

      - name: Publish manual release
        if: inputs.publish == true && !startsWith(github.ref, 'refs/tags/v')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public --tag "${{ inputs.dist_tag }}"

  github-release:
    name: Create GitHub release notes
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release create "$TAG_NAME" --generate-notes --title "$TAG_NAME"
