name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing immutable stable release tag matching the current package version"
        required: true
        type: string
      approval_scope:
        description: "Required explicit approval scope for GitHub release creation"
        required: true
        default: "ga-approved"
        type: choice
        options:
          - ga-approved

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify approved stable release source
    if: github.repository == 'jyt6640/persona-harness' && github.ref == 'refs/heads/main' && inputs.approval_scope == 'ga-approved'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Verify approved release source
        env:
          APPROVAL_SCOPE: ${{ inputs.approval_scope }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = refs/heads/main
          test "$GITHUB_REPOSITORY" = jyt6640/persona-harness
          git fetch origin main --tags
          package_version="$(node -p "require('./package.json').version")"
          canonical_main_sha="$(git rev-parse refs/remotes/origin/main)"
          tag_commit="$(git rev-parse "refs/tags/${TAG_NAME}^{commit}")"
          if git merge-base --is-ancestor "$tag_commit" refs/remotes/origin/main; then
            is_ancestor=true
          else
            is_ancestor=false
          fi
          node scripts/release-workflow-policy.mjs tag-source \
            --tag "$TAG_NAME" \
            --version "$package_version" \
            --sha "$tag_commit" \
            --tag-commit "$tag_commit" \
            --canonical-main-sha "$canonical_main_sha" \
            --is-ancestor "$is_ancestor"
          node scripts/release-workflow-policy.mjs dist-tag \
            --approval-scope "$APPROVAL_SCOPE" \
            --version "$package_version" \
            --dist-tag latest

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test:repository

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Rule diagnostics
        run: npm run report:rules

      - name: Scope check
        run: npm run check:scope:strict

      - name: Injection value check
        run: npm run check:injection-value

      - name: GitHub release notes check
        run: npm run check:github-release-notes

      - name: Package dry run
        run: npm pack --dry-run

      - name: Publish dry run
        run: npm publish --dry-run --access public --tag latest

  github-release:
    name: Create approved GitHub release notes
    needs: verify
    if: github.event_name == 'workflow_dispatch' && inputs.approval_scope == 'ga-approved'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20

      - name: Generate release body
        env:
          TAG_NAME: ${{ inputs.tag }}
        run: node scripts/generate-github-release-notes.mjs --tag "$TAG_NAME" --out github-release-notes.md

      - name: Create or verify GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag_commit="$(git rev-parse "refs/tags/${TAG_NAME}^{commit}")"
          if gh release view "$TAG_NAME" \
            --json tagName,name,isPrerelease,targetCommitish \
            > existing-release.json 2> release-view-error.txt; then
            :
          else
            if ! grep -Eiq "404|not found" release-view-error.txt; then
              exit 1
            fi
            gh release create "$TAG_NAME" \
              --target "$tag_commit" \
              --notes-file github-release-notes.md \
              --title "$TAG_NAME"
            gh release view "$TAG_NAME" \
              --json tagName,name,isPrerelease,targetCommitish \
              > existing-release.json
          fi
          node scripts/release-workflow-policy.mjs release-state \
            --release existing-release.json \
            --tag "$TAG_NAME" \
            --tag-commit "$tag_commit" \
            --expected-commit "$tag_commit" \
            --expected-prerelease false
