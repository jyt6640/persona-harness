name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Verify release source
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          package_version="$(node -p "require('./package.json').version")"
          canonical_main_sha="$(git rev-parse refs/remotes/origin/main)"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag_commit="$(git rev-parse "${GITHUB_REF}^{commit}")"
            if git merge-base --is-ancestor "$tag_commit" refs/remotes/origin/main; then
              is_ancestor=true
            else
              is_ancestor=false
            fi
            node scripts/release-workflow-policy.mjs tag-source \
              --tag "$TAG_NAME" \
              --version "$package_version" \
              --sha "$GITHUB_SHA" \
              --tag-commit "$tag_commit" \
              --canonical-main-sha "$canonical_main_sha" \
              --is-ancestor "$is_ancestor"
          else
            if git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
              is_ancestor=true
            else
              is_ancestor=false
            fi
            node scripts/release-workflow-policy.mjs canonical-main \
              --ref "$GITHUB_REF" \
              --sha "$GITHUB_SHA" \
              --canonical-main-sha "$canonical_main_sha" \
              --is-ancestor "$is_ancestor"
          fi

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Rule diagnostics
        run: npm run report:rules

      - name: Scope check
        run: npm run check:scope:strict

      - name: Injection value check
        run: npm run check:injection-value

      - name: GitHub release notes check
        run: npm run check:github-release-notes

      - name: Package dry run
        run: npm pack --dry-run

      - name: Publish dry run
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          dist_tag=next
          if [[ "$TAG_NAME" == v* ]]; then
            dist_tag=latest
            if [[ "$TAG_NAME" == *"-alpha."* ]]; then
              dist_tag=alpha
            elif [[ "$TAG_NAME" == *"-beta."* ]]; then
              dist_tag=beta
            elif [[ "$TAG_NAME" == *"-rc."* ]]; then
              dist_tag=next
            fi
          fi
          npm publish --dry-run --access public --tag "$dist_tag"

  github-release:
    name: Create GitHub release notes
    needs: verify
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20

      - name: Generate release body
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: node scripts/generate-github-release-notes.mjs --tag "$TAG_NAME" --out github-release-notes.md

      - name: Create or verify GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          prerelease_args=()
          expected_prerelease=false
          if [[ "$TAG_NAME" == *"-"* ]]; then
            prerelease_args+=(--prerelease)
            expected_prerelease=true
          fi
          if gh release view "$TAG_NAME" \
            --json tagName,name,isPrerelease,targetCommitish \
            > existing-release.json 2> release-view-error.txt; then
            :
          else
            if ! grep -Eiq "404|not found" release-view-error.txt; then
              cat release-view-error.txt
              exit 1
            fi
            gh release create "$TAG_NAME" \
              --target "$GITHUB_SHA" \
              --notes-file github-release-notes.md \
              --title "$TAG_NAME" \
              "${prerelease_args[@]}"
            gh release view "$TAG_NAME" \
              --json tagName,name,isPrerelease,targetCommitish \
              > existing-release.json
          fi
          tag_commit="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${TAG_NAME}" --jq '.sha')"
          node scripts/release-workflow-policy.mjs release-state \
            --release existing-release.json \
            --tag "$TAG_NAME" \
            --tag-commit "$tag_commit" \
            --expected-commit "$GITHUB_SHA" \
            --expected-prerelease "$expected_prerelease"
