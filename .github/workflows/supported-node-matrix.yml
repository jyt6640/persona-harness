name: Supported Node matrix

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supported-node-matrix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  support:
    name: Support matrix / ${{ matrix.platform }} / Node ${{ matrix.node }} / ${{ matrix.coverage }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            node: "20.17.0"
            expected-node: "20.17.0"
            node-mode: exact
            coverage: runtime-floor
          - runner: ubuntu-latest
            platform: linux
            node: "22.9.0"
            expected-node: "22.9.0"
            node-mode: exact
            coverage: runtime-floor
          - runner: ubuntu-latest
            platform: linux
            node: "20"
            expected-node: "20"
            node-mode: major
            coverage: supported-latest
          - runner: ubuntu-latest
            platform: linux
            node: "22"
            expected-node: "22"
            node-mode: major
            coverage: supported-latest
          - runner: ubuntu-latest
            platform: linux
            node: "24"
            expected-node: "24"
            node-mode: major
            coverage: supported-latest
          - runner: macos-latest
            platform: macos
            node: "22"
            expected-node: "22"
            node-mode: major
            coverage: limited-smoke

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Show support environment
        run: |
          node --version
          npm --version
          printf 'platform=%s node=%s coverage=%s\n' '${{ matrix.platform }}' '${{ matrix.node }}' '${{ matrix.coverage }}'

      - name: Install dependencies
        run: npm ci

      - name: Check support matrix policy
        run: node scripts/check-supported-node-matrix.mjs

      - name: Run Linux source repository checks
        if: matrix.platform == 'linux' && matrix.coverage == 'supported-latest'
        run: npm run test:repository

      - name: Build source candidate
        run: npm run build

      - name: Verify source-built package surface
        run: node scripts/verify-supported-node-surface.mjs --surface source --expected-platform "${{ matrix.platform }}" --expected-node "${{ matrix.expected-node }}" --expected-node-mode "${{ matrix.node-mode }}"

      - name: Verify fresh local-tarball installed package surface
        run: node scripts/verify-supported-node-surface.mjs --surface installed --expected-platform "${{ matrix.platform }}" --expected-node "${{ matrix.expected-node }}" --expected-node-mode "${{ matrix.node-mode }}"
