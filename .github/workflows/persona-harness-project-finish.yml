name: Produce signed public project finish attestation

on:
  workflow_call:

concurrency:
  group: project-finish-attestation-${{ github.repository_id }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  attest:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.event.repository.private == false
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pushed public project source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify pushed public project checkout
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REPOSITORY_VISIBILITY: ${{ github.repository_visibility }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = push
          test "$GITHUB_REF" = refs/heads/main
          test "$GITHUB_REPOSITORY_VISIBILITY" = public
          git fetch origin main --no-tags
          test "$(git rev-parse refs/remotes/origin/main)" = "$GITHUB_SHA"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"

      - name: Resolve immutable Persona Harness producer revision
        id: producer-pin
        env:
          CALLER_WORKFLOW_REF: ${{ github.workflow_ref }}
          GITHUB_JOB: ${{ github.job }}
        run: |
          ruby <<'RUBY'
          # BEGIN PRODUCER_PIN_RESOLVER
          require "yaml"
          require "psych"

          EXPECTED_REPOSITORY = "jyt6640/persona-harness"
          EXPECTED_WORKFLOW_PATH = ".github/workflows/persona-harness-project-finish.yml"
          EXPECTED_TARGET = "#{EXPECTED_REPOSITORY}/#{EXPECTED_WORKFLOW_PATH}"
          CALLER_PATH = /\A\.github\/workflows\/[A-Za-z0-9][A-Za-z0-9._-]{0,127}\.ya?ml\z/
          PINNED_TARGET = /\A#{Regexp.escape(EXPECTED_TARGET)}@([a-f0-9]{40})\z/

          def fail_closed
            raise "project-finish-producer-caller-pin"
          end

          def reject_duplicate_mapping_keys(node)
            case node
            when Psych::Nodes::Document, Psych::Nodes::Sequence, Psych::Nodes::Stream
              node.children.each { |child| reject_duplicate_mapping_keys(child) }
            when Psych::Nodes::Mapping
              keys = {}
              node.children.each_slice(2) do |key, value|
                fail_closed unless key.is_a?(Psych::Nodes::Scalar)
                fail_closed if keys.key?(key.value)
                keys[key.value] = true
                reject_duplicate_mapping_keys(value)
              end
            when Psych::Nodes::Alias
              fail_closed
            end
          end

          begin
            workspace = File.realpath(ENV.fetch("GITHUB_WORKSPACE"))
            repository = ENV.fetch("GITHUB_REPOSITORY")
            workflow_ref = ENV.fetch("CALLER_WORKFLOW_REF")
            job_name = ENV.fetch("GITHUB_JOB")
            ref_match = /\A#{Regexp.escape(repository)}\/(.+)@refs\/heads\/main\z/.match(workflow_ref)
            fail_closed if ref_match.nil?
            relative_path = ref_match[1]
            fail_closed unless CALLER_PATH.match?(relative_path)

            candidate = File.expand_path(relative_path, workspace)
            fail_closed unless candidate.start_with?("#{workspace}/")
            fail_closed unless File.lstat(candidate).file?
            fail_closed unless File.realpath(candidate) == candidate

            source = File.read(candidate)
            stream = Psych.parse_stream(source)
            fail_closed unless stream.children.length == 1
            reject_duplicate_mapping_keys(stream.children[0])
            document = YAML.safe_load(source, [], [], false)
            fail_closed unless document.is_a?(Hash)
            jobs = document["jobs"]
            fail_closed unless jobs.is_a?(Hash)
            current_job = jobs[job_name]
            fail_closed unless current_job.is_a?(Hash)
            current_uses = current_job["uses"]
            fail_closed unless current_uses.is_a?(String)

            matching_jobs = jobs.each_with_object([]) do |(name, job), values|
              next unless name.is_a?(String) && job.is_a?(Hash)
              uses = job["uses"]
              next unless uses.is_a?(String) && uses.start_with?("#{EXPECTED_TARGET}@")
              values << [name, uses]
            end
            pin_match = PINNED_TARGET.match(current_uses)
            fail_closed if pin_match.nil?
            fail_closed unless matching_jobs == [[job_name, current_uses]]

            File.open(ENV.fetch("GITHUB_OUTPUT"), "a") do |output|
              output.write("sha=#{pin_match[1]}\n")
            end
          rescue StandardError
            abort "project-finish-producer-caller-pin"
          end
          # END PRODUCER_PIN_RESOLVER
          RUBY

      - name: Checkout immutable Persona Harness producer
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
          path: .persona-harness-producer
          persist-credentials: false
          ref: ${{ steps.producer-pin.outputs.sha }}
          repository: jyt6640/persona-harness

      - name: Verify reusable producer checkout
        env:
          PERSONA_HARNESS_PRODUCER_SHA: ${{ steps.producer-pin.outputs.sha }}
        run: |
          set -euo pipefail
          test "$(git -C .persona-harness-producer rev-parse HEAD)" = "$PERSONA_HARNESS_PRODUCER_SHA"
          test "$(git -C .persona-harness-producer config --get remote.origin.url)" = https://github.com/jyt6640/persona-harness.git

      - name: Setup producer Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          cache: npm
          cache-dependency-path: .persona-harness-producer/package-lock.json
          node-version: 20

      - name: Install immutable producer dependencies
        working-directory: .persona-harness-producer
        run: npm ci

      - name: Build immutable producer
        working-directory: .persona-harness-producer
        run: npm run build

      - name: Build canonical project receipt and predicate
        working-directory: .persona-harness-producer
        env:
          PERSONA_HARNESS_PRODUCER_SHA: ${{ steps.producer-pin.outputs.sha }}
        run: node scripts/build-project-finish-attestation.mjs

      - name: Sign canonical project receipt
        id: attest
        uses: actions/attest@ce27ba3b4a9a139d9a20a4a07d69fabb52f1e5bc
        with:
          predicate-path: .ci/project-finish-attestation/predicate.json
          predicate-type: https://github.com/jyt6640/persona-harness/attestations/project-finish-attestation.1
          subject-path: .ci/project-finish-attestation/receipt.json

      - name: Collect signed bundle
        run: cp "${{ steps.attest.outputs.bundle-path }}" .ci/project-finish-attestation/bundle.json

      - name: Upload signed project finish attestation
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          if-no-files-found: error
          name: project-finish-attestation
          path: .ci/project-finish-attestation
          retention-days: 7

      - name: Upload bounded project finish failure diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          if-no-files-found: ignore
          name: project-finish-attestation-failure
          path: .ci/project-finish-attestation/failure-diagnostic.json
          retention-days: 7
