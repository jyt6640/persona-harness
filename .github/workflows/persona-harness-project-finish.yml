name: Produce signed public project finish attestation

on:
  workflow_call:

concurrency:
  group: project-finish-attestation-${{ github.repository_id }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  attest:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.event.repository.private == false
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pushed public project source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify pushed public project checkout
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REPOSITORY_VISIBILITY: ${{ github.repository_visibility }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = push
          test "$GITHUB_REF" = refs/heads/main
          test "$GITHUB_REPOSITORY_VISIBILITY" = public
          git fetch origin main --no-tags
          test "$(git rev-parse refs/remotes/origin/main)" = "$GITHUB_SHA"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"

      - name: Resolve immutable Persona Harness producer revision
        id: producer-pin
        env:
          CALLER_WORKFLOW_REF: ${{ github.workflow_ref }}
          GITHUB_JOB: ${{ github.job }}
        run: |
          node <<'NODE'
          // BEGIN PRODUCER_PIN_RESOLVER
          const fs = require("node:fs")
          const path = require("node:path")

          const FAILURE_CODE = "project-finish-producer-caller-pin"
          const EXPECTED_REPOSITORY = "jyt6640/persona-harness"
          const EXPECTED_WORKFLOW_PATH = ".github/workflows/persona-harness-project-finish.yml"
          const EXPECTED_TARGET = `${EXPECTED_REPOSITORY}/${EXPECTED_WORKFLOW_PATH}`
          const MAX_WORKFLOW_BYTES = 128 * 1024
          const CALLER_PATH = /^\.github\/workflows\/[A-Za-z0-9][A-Za-z0-9._-]{0,127}\.ya?ml$/u
          const PINNED_TARGET = new RegExp(`^${escapeRegExp(EXPECTED_TARGET)}@([a-f0-9]{40})$`, "u")

          function failClosed() {
            throw new Error(FAILURE_CODE)
          }

          function requiredEnv(name) {
            const value = process.env[name]
            if (typeof value !== "string" || value.length === 0 || value.length > 512 || /[\u0000\r\n]/u.test(value)) failClosed()
            return value
          }

          function escapeRegExp(value) {
            return value.replace(/[.*+?^${}()|[\]\\]/gu, "\\$&")
          }

          function structuredJobs(source) {
            const lines = source.split(/\r?\n/u).flatMap((raw, index) => {
              if (raw.includes("\u0000") || raw.includes("\t")) failClosed()
              const content = stripComment(raw.slice(raw.search(/\S/u)))
              return content.length === 0 ? [] : [{ content, indent: raw.length - raw.trimStart().length, line: index + 1 }]
            })
            const roots = lines.filter(({ content, indent }) => indent === 0 && content === "jobs:")
            if (roots.length !== 1) failClosed()
            const jobsRoot = roots[0]
            const section = lines.filter(({ indent, line }) => line > jobsRoot.line && indent > jobsRoot.indent)
            if (section.length === 0) failClosed()
            const jobIndent = section[0].indent
            const jobs = new Map()
            let current

            for (const entry of section) {
              if (entry.indent < jobIndent) break
              if (entry.indent === jobIndent) {
                const match = /^([A-Za-z0-9_-]{1,128}):$/u.exec(entry.content)
                if (match === null || jobs.has(match[1])) failClosed()
                current = { keys: new Set(), name: match[1], propertyIndent: undefined, uses: undefined }
                jobs.set(match[1], current)
                continue
              }
              if (current === undefined) failClosed()
              if (current.propertyIndent === undefined) current.propertyIndent = entry.indent
              if (entry.indent !== current.propertyIndent) continue

              const match = /^([A-Za-z0-9_-]{1,128}):(?:[ ]+(.*))?$/u.exec(entry.content)
              if (match === null || current.keys.has(match[1])) failClosed()
              current.keys.add(match[1])
              if (match[1] === "uses") current.uses = parseScalar(match[2])
            }
            return jobs
          }

          function stripComment(value) {
            let quote = ""
            for (let index = 0; index < value.length; index += 1) {
              const character = value[index]
              if (quote === "") {
                if (character === "'" || character === "\"") quote = character
                if (character === "#" && (index === 0 || /\s/u.test(value[index - 1]))) return value.slice(0, index).trimEnd()
              } else if (character === quote && value[index - 1] !== "\\") {
                quote = ""
              }
            }
            return value.trimEnd()
          }

          function parseScalar(value) {
            if (typeof value !== "string" || value.length === 0 || value.length > 512) failClosed()
            if (value.startsWith("\"")) {
              try {
                const decoded = JSON.parse(value)
                if (typeof decoded !== "string") failClosed()
                return decoded
              } catch {
                failClosed()
              }
            }
            if (value.startsWith("'")) {
              if (!/^'[^']*'$/u.test(value)) failClosed()
              return value.slice(1, -1)
            }
            if (/[&*!|>{}\[\],]/u.test(value)) failClosed()
            return value
          }

          try {
            const workspace = fs.realpathSync(requiredEnv("GITHUB_WORKSPACE"))
            const repository = requiredEnv("GITHUB_REPOSITORY")
            const workflowRef = requiredEnv("CALLER_WORKFLOW_REF")
            const jobName = requiredEnv("GITHUB_JOB")
            const reference = new RegExp(`^${escapeRegExp(repository)}/(.+)@refs/heads/main$`, "u").exec(workflowRef)
            if (reference === null || !CALLER_PATH.test(reference[1])) failClosed()

            const candidate = path.resolve(workspace, reference[1])
            if (path.relative(workspace, candidate).startsWith("..") || !fs.lstatSync(candidate).isFile() || fs.realpathSync(candidate) !== candidate) failClosed()

            const source = fs.readFileSync(candidate, "utf8")
            if (Buffer.byteLength(source, "utf8") > MAX_WORKFLOW_BYTES) failClosed()
            const jobs = structuredJobs(source)
            const current = jobs.get(jobName)
            if (current === undefined || current.uses === undefined) failClosed()
            const matching = [...jobs.values()].filter(({ uses }) => typeof uses === "string" && uses.startsWith(`${EXPECTED_TARGET}@`))
            const pin = PINNED_TARGET.exec(current.uses)
            if (pin === null || matching.length !== 1 || matching[0] !== current) failClosed()

            fs.appendFileSync(requiredEnv("GITHUB_OUTPUT"), `sha=${pin[1]}\n`, { encoding: "utf8", mode: 0o600 })
          } catch {
            process.stderr.write(`${FAILURE_CODE}\n`)
            process.exitCode = 1
          }
          // END PRODUCER_PIN_RESOLVER
          NODE

      - name: Checkout immutable Persona Harness producer
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
          path: .persona-harness-producer
          persist-credentials: false
          ref: ${{ steps.producer-pin.outputs.sha }}
          repository: jyt6640/persona-harness

      - name: Verify reusable producer checkout
        env:
          PERSONA_HARNESS_PRODUCER_SHA: ${{ steps.producer-pin.outputs.sha }}
        run: |
          set -euo pipefail
          test "$(git -C .persona-harness-producer rev-parse HEAD)" = "$PERSONA_HARNESS_PRODUCER_SHA"
          test "$(git -C .persona-harness-producer config --get remote.origin.url)" = https://github.com/jyt6640/persona-harness.git

      - name: Setup producer Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          cache: npm
          cache-dependency-path: .persona-harness-producer/package-lock.json
          node-version: 20

      - name: Install immutable producer dependencies
        working-directory: .persona-harness-producer
        run: npm ci

      - name: Build immutable producer
        working-directory: .persona-harness-producer
        run: npm run build

      - name: Build canonical project receipt and predicate
        working-directory: .persona-harness-producer
        env:
          PERSONA_HARNESS_PRODUCER_SHA: ${{ steps.producer-pin.outputs.sha }}
        run: node scripts/build-project-finish-attestation.mjs

      - name: Sign canonical project receipt
        id: attest
        uses: actions/attest@ce27ba3b4a9a139d9a20a4a07d69fabb52f1e5bc
        with:
          predicate-path: .ci/project-finish-attestation/predicate.json
          predicate-type: https://github.com/jyt6640/persona-harness/attestations/project-finish-attestation.1
          subject-path: .ci/project-finish-attestation/receipt.json

      - name: Collect signed bundle
        run: cp "${{ steps.attest.outputs.bundle-path }}" .ci/project-finish-attestation/bundle.json

      - name: Upload signed project finish attestation
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          if-no-files-found: error
          name: project-finish-attestation
          path: .ci/project-finish-attestation
          retention-days: 7

      - name: Upload bounded project finish failure diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          if-no-files-found: ignore
          name: project-finish-attestation-failure
          path: .ci/project-finish-attestation/failure-diagnostic.json
          retention-days: 7
