name: Produce staged package artifact attestation

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Fixed staged package channel"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - next
      version:
        description: "Exact strict SemVer prerelease already mapped by the selected channel"
        required: true
        type: string

concurrency:
  group: staged-package-artifact-attestation-${{ github.ref }}-${{ inputs.channel }}-${{ inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  attest:
    name: Produce protected-main staged package artifact binding
    if: github.repository == 'jyt6640/persona-harness' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Verify protected main source
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = workflow_dispatch
          test "$GITHUB_REF" = refs/heads/main
          test "$GITHUB_REPOSITORY" = jyt6640/persona-harness
          git fetch origin main --no-tags
          test "$(git rev-parse refs/remotes/origin/main)" = "$GITHUB_SHA"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch and bind the exact staged package artifact
        env:
          SELECTED_CHANNEL: ${{ inputs.channel }}
          SELECTED_VERSION: ${{ inputs.version }}
        run: node scripts/build-staged-package-artifact-attestation.mjs --channel "$SELECTED_CHANNEL" --version "$SELECTED_VERSION"

      - name: Sign exact downloaded npm tarball
        id: attest
        uses: actions/attest@ce27ba3b4a9a139d9a20a4a07d69fabb52f1e5bc
        with:
          subject-path: .ci/staged-package-artifact-attestation/package.tgz
          predicate-type: https://github.com/jyt6640/persona-harness/attestations/staged-package-artifact-binding.1
          predicate-path: .ci/staged-package-artifact-attestation/predicate.json

      - name: Collect signed bundle
        run: cp "${{ steps.attest.outputs.bundle-path }}" .ci/staged-package-artifact-attestation/bundle.json

      - name: Upload staged package artifact attestation
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: staged-package-artifact-attestation
          path: .ci/staged-package-artifact-attestation
          if-no-files-found: error
          retention-days: 7
