name: Canonical clean CI attestation builder

on:
  push:
    branches-ignore:
      - main
  workflow_call:
  workflow_dispatch:

concurrency:
  group: canonical-clean-ci-attestation-builder-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build:
    name: Build non-authoritative clean CI attestation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build canonical receipt and predicate
        run: node scripts/build-clean-ci-attestation.mjs

      - name: Sign non-authoritative builder predicate
        id: attest
        uses: actions/attest@ce27ba3b4a9a139d9a20a4a07d69fabb52f1e5bc
        with:
          subject-path: .ci/canonical-clean-ci-attestation-builder/receipt.json
          predicate-type: https://github.com/jyt6640/persona-harness/attestations/clean-ci-builder.1
          predicate-path: .ci/canonical-clean-ci-attestation-builder/predicate.json

      - name: Collect signed bundle
        run: cp "${{ steps.attest.outputs.bundle-path }}" .ci/canonical-clean-ci-attestation-builder/bundle.json

      - name: Upload signed builder artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: canonical-clean-ci-attestation-builder
          path: .ci/canonical-clean-ci-attestation-builder
          if-no-files-found: error
          retention-days: 7
