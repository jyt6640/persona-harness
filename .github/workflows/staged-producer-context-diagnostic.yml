name: Diagnose staged producer context

on:
  workflow_dispatch:

concurrency:
  group: staged-producer-context-diagnostic-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  diagnose:
    name: Diagnose protected-main staged producer context
    if: github.repository == 'jyt6640/persona-harness' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Emit bounded context diagnostic
        run: node scripts/diagnose-staged-package-artifact-context.mjs
