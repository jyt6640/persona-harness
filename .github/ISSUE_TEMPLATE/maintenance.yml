name: Maintenance / workflow improvement
description: Propose a bounded improvement to tooling, CI, documentation, or repository operations.
title: "Maintenance: <concrete repository change>"
labels:
  - maintenance
body:
  - type: markdown
    attributes:
      value: |
        Use this for a specific repository improvement. Name the behavior or
        workflow being improved rather than a phase number or broad cleanup.
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What repository workflow or maintenance problem should improve?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Proposed scope
      description: Name the files, surfaces, or automation expected to change.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance checks
      description: What commands, CI checks, or manual observations will prove the work is complete?
    validations:
      required: true
  - type: textarea
    id: close_condition
    attributes:
      label: Observable close condition
      description: State the exact command, artifact, state transition, or user-visible result that would close this issue.
    validations:
      required: true
  - type: textarea
    id: full_boundary
    attributes:
      label: Full boundary and fail-closed case
      description: Name every input-to-output link in scope, plus the malformed, missing, unsafe, or hostile input that must block safely.
    validations:
      required: true
  - type: textarea
    id: independent_evidence
    attributes:
      label: Independent evidence and hosted residual
      description: Name the independent evidence needed for closure and the one hosted-only observation that cannot be reproduced locally. Write "None" only when both are truly absent.
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Risks and non-goals
      description: Note release, migration, compatibility, or security boundaries. Write "None known" when appropriate.
    validations:
      required: true
