name: Bug report
description: Something in the ph CLI, workflow rail, gate, or OpenCode plugin behaves incorrectly.
title: "Bug: <affected command or behavior>"
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Report the concrete behavior that failed. Persona Harness is evaluated by
        commands, exit codes, and files on disk, so redact secrets and include
        the smallest reproducible evidence.
  - type: input
    id: surface
    attributes:
      label: Affected surface
      description: Command, workflow, package path, or OpenCode integration that failed.
      placeholder: "ph workflow finish implement"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `npx ph --version` (and how installed — npm tag or tarball).
      placeholder: "0.5.0 (persona-harness@latest)"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Exact commands, in order.
      placeholder: |
        npx ph init
        npx ph workflow finish implement
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
      description: Include the expected and actual exit code, file state, blocker, or output.
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Node version, Java/Gradle version, OpenCode version if relevant.
    validations:
      required: false
