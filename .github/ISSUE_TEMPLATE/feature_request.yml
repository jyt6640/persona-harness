name: Feature / change proposal
description: Propose a new gate, convention, or capability.
title: "Feature: <user outcome>"
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the user outcome and the observable behavior. Persona Harness
        stays deliberately narrow: proposals that expand a claim must include
        the measurement needed to support it.
  - type: textarea
    id: problem
    attributes:
      label: Current problem
      description: What concrete workflow is not handled today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should a user be able to observe after this change?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior and boundaries
      description: Describe the requested behavior, a violating case, and a safe near-miss that must not trigger.
    validations:
      required: true
  - type: textarea
    id: close_condition
    attributes:
      label: Observable close condition
      description: State the exact command, artifact, state transition, or user-visible result that would close this issue.
    validations:
      required: true
  - type: textarea
    id: full_boundary
    attributes:
      label: Full boundary and fail-closed case
      description: Name every input-to-output link in scope, plus the malformed, missing, unsafe, or hostile input that must block safely.
    validations:
      required: true
  - type: textarea
    id: independent_evidence
    attributes:
      label: Independent evidence and hosted residual
      description: Name the independent evidence needed for closure and the one hosted-only observation that cannot be reproduced locally. Write "None" only when both are truly absent.
    validations:
      required: true
  - type: dropdown
    id: claim
    attributes:
      label: Does this expand a claim?
      options:
        - "No — it's a deterministic gate/fix, no efficacy claim"
        - "Yes — and I can describe an A/B to prove it"
        - "Not sure"
    validations:
      required: true
  - type: textarea
    id: measurement
    attributes:
      label: Measurement plan
      description: Required for a new claim. Name the fixture, comparison, metrics, and the result that would reject the idea.
    validations:
      required: false
